name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 target
        if: matrix.arch == 'arm64'
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Build
        if: matrix.arch == 'x64'
        run: cargo build --verbose

      - name: Build (ARM64)
        if: matrix.arch == 'arm64'
        run: cargo build --verbose --target aarch64-unknown-linux-gnu

      - name: Run tests
        if: matrix.arch == 'x64'
        run: cargo test --verbose

      - name: Run tests (ARM64)
        if: matrix.arch == 'arm64'
        run: cargo test --verbose --target aarch64-unknown-linux-gnu

  miri:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Miri
        run: rustup toolchain install nightly --component miri,rust-src

      - name: Set up Miri
        run: cargo +nightly miri setup

      - name: Run Miri tests
        run: cargo +nightly miri test

      - name: Run Miri tests with match_end_col
        run: cargo +nightly miri test --features match_end_col
